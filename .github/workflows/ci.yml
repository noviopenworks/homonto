name: ci

on:
  push:
  pull_request:

# Least-privilege by default: CI only reads the repo.
permissions:
  contents: read

jobs:
  # One shared gate drives CI, local rehearsal, and release publication
  # (scripts/gate.sh), so no path runs a weaker check set than another. It covers
  # gofmt, mod-tidy, vet, build, test, race, version-stamp + cli smoke,
  # govulncheck, and the dual-binary Docker E2E (five suites incl. release
  # packaging). ubuntu-latest ships a Docker daemon, which the E2E suites need.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gate
        run: ./scripts/gate.sh
