name = "to"
version = "0.1.0"
description = "to — minimal coding framework for LLMs (plan → do → done)"

[dependencies]
frameworks = []

[skills]
to = "skills/to"
to-plan = "skills/to-plan"
to-do = "skills/to-do"
to-done = "skills/to-done"
to-no-slop = "skills/to-no-slop"

[commands]
to = "commands/to.md"
to-plan = "commands/to-plan.md"
to-do = "commands/to-do.md"
to-done = "commands/to-done.md"
to-no-slop = "commands/to-no-slop.md"

# The to skills delegate to these specialist subagents — onto's cast, adapted:
# one subagent at a time, strictly sequential, never in parallel. Every
# resource this framework ships is namespaced `to-*` (the dispatcher skill is
# the bare namespace root, `to`), so installing to never collides with another
# framework's — or your own — agent of the same generic name. Do NOT also
# declare them in a top-level [subagents.*] table. onto and to are mutually
# exclusive: homonto refuses a config that declares both frameworks.
[subagents]
to-explorer = "subagents/to-explorer.md"
to-implementer = "subagents/to-implementer.md"
to-reviewer = "subagents/to-reviewer.md"
to-skeptic = "subagents/to-skeptic.md"
