[frameworks.comet]
source = "builtin:comet"
scope = "project"

[commands.example-command]
source = "builtin:example-command"
scope = "project"

[subagents.onto-reviewer]
source = "builtin:onto-reviewer"
scope = "project"

[subagents.onto-explorer]
source = "builtin:onto-explorer"
scope = "project"

# Declared subagents must declare a [subagents.<name>.<tool>] block with a
# non-empty model for every tool they target. onto-reviewer (review/judgement)
# and onto-explorer (cheap lookups) target both tools by default.
[subagents.onto-reviewer.claude]
model = "opus"
[subagents.onto-reviewer.opencode]
model = "anthropic/claude-opus-4-8"

[subagents.onto-explorer.claude]
model = "haiku"
effort = "low"
[subagents.onto-explorer.opencode]
model = "openai/gpt-5-mini"
variant = "cheap"
