name: release

# Build cross-platform binaries, checksum them, and attach them to a GitHub
# release whenever a v* tag is pushed. Go cross-compiles from a single runner,
# so one job produces every target; the version string is stamped from the tag.
on:
  push:
    tags:
      - "v*"

# Least-privilege: only the release job needs to write releases; everything
# else is read-only.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # Guard: never ship a tag that does not pass the same gates as CI.
      - name: verify
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...

      - name: build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p dist
          ldflags="-s -w -X github.com/noviopenworks/homonto/internal/cli.Version=${VERSION}"
          # macOS ships only amd64+arm64; Windows and Linux cover both too.
          for target in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            out="homonto_${VERSION}_${goos}_${goarch}"
            bin="homonto"
            if [ "$goos" = "windows" ]; then bin="homonto.exe"; fi
            echo "building $out"
            mkdir -p "dist/$out"
            cp LICENSE README.md "dist/$out/"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" -o "dist/$out/$bin" .
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "$out.zip" "$out")
            else
              tar -C dist -czf "dist/$out.tar.gz" "$out"
            fi
            rm -rf "dist/$out"
          done

      - name: checksums
        run: |
          set -eu
          cd dist
          # One SHA256SUMS file over every archive, so downloaders can verify.
          sha256sum ./*.tar.gz ./*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          # Pre-releases (rc/beta/alpha) are marked as such so they never show as
          # "latest"; a bare vX.Y.Z is a full release.
          prerelease=""
          case "$VERSION" in
            *-*) prerelease="--prerelease" ;;
          esac
          # docs/release-notes.md (accepted limitations) is prepended to the
          # auto-generated changelog, so every release states its limitations.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file docs/release-notes.md \
            --generate-notes \
            $prerelease \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS
