name: ci

on:
  push:
  pull_request:

# Least-privilege by default: CI only reads the repo.
permissions:
  contents: read

jobs:
  # One shared gate drives CI, local rehearsal, and release publication
  # (scripts/gate.sh), so no path runs a weaker check set than another. It covers
  # gofmt, mod-tidy, vet, build, test, race, version-stamp + cli smoke,
  # govulncheck, and the dual-binary Docker E2E (five suites incl. release
  # packaging). ubuntu-latest ships a Docker daemon, which the E2E suites need.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Match go.mod's pinned toolchain (go1.26.5). Provisioning an older Go
          # let `go run govulncheck@latest` downgrade to go1.25 (x/vuln needs
          # >=1.25), which then cannot parse the go1.26-gated stdlib files the
          # pinned toolchain pulls in — failing the gate before it starts.
          go-version: "1.26.5"
      - name: gate
        run: ./scripts/gate.sh
