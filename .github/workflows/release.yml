name: release

# Build cross-platform binaries, checksum them, and attach them to a GitHub
# release whenever a v* tag is pushed. Go cross-compiles from a single runner,
# so one job produces every target; the version string is stamped from the tag.
on:
  push:
    tags:
      - "v*"

# Least-privilege: only the release job needs to write releases; everything
# else is read-only.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Match go.mod's pinned toolchain (go1.26.5); see the note in ci.yml —
          # an older Go lets govulncheck downgrade to go1.25 and fail the gate.
          go-version: "1.26.5"

      # Guard: never ship a tag that does not pass the COMPLETE gate. This is the
      # same scripts/gate.sh that CI and local rehearsal run — race, mod-tidy,
      # vet, build, test, version stamps, cli smoke, govulncheck, and the
      # triple-binary Docker E2E (incl. release-packaging smoke) — so a tag can
      # never publish on a weaker gate than a pull request.
      - name: gate
        run: ./scripts/gate.sh

      # Build, package, and checksum all three binaries (homonto + onto + to)
      # for every target. The packaging logic lives in scripts/build-release.sh
      # so it is testable off CI and shared by the local and release code paths.
      - name: build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: scripts/build-release.sh "${VERSION}"

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          # Pre-releases (rc/beta/alpha) are marked as such so they never show as
          # "latest"; a bare vX.Y.Z is a full release.
          prerelease=""
          case "$VERSION" in
            *-*) prerelease="--prerelease" ;;
          esac
          # docs/release-notes.md (accepted limitations) is prepended to the
          # auto-generated changelog, so every release states its limitations.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file docs/release-notes.md \
            --generate-notes \
            $prerelease \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS
