name = "onto"
version = "0.3.1"
description = "Onto self-contained development workflow"

[dependencies]
frameworks = []

[skills]
onto = "skills/onto"
onto-build = "skills/onto-build"
onto-close = "skills/onto-close"
onto-design = "skills/onto-design"
onto-fix = "skills/onto-fix"
onto-open = "skills/onto-open"
onto-tweak = "skills/onto-tweak"
onto-verify = "skills/onto-verify"
onto-no-slop = "skills/onto-no-slop"

[commands]
onto = "commands/onto.md"
onto-open = "commands/onto-open.md"
onto-design = "commands/onto-design.md"
onto-build = "commands/onto-build.md"
onto-verify = "commands/onto-verify.md"
onto-close = "commands/onto-close.md"
onto-fix = "commands/onto-fix.md"
onto-tweak = "commands/onto-tweak.md"
onto-no-slop = "commands/onto-no-slop.md"

# The onto skills delegate to these specialist subagents (see the dispatcher
# skill's "Delegation" section). Shipping them with the framework means
# installing onto connects the whole team; do NOT also declare them in a
# top-level [subagents.*] table (that collides with the framework declaration).
# Every resource this framework ships is namespaced `onto-*` (the dispatcher
# itself is the bare namespace root, `onto`), so installing onto never collides
# with another framework's — or your own — agent of the same generic name.
[subagents]
onto = "subagents/onto.md"
onto-explorer = "subagents/onto-explorer.md"
onto-reviewer = "subagents/onto-reviewer.md"
onto-implementer = "subagents/onto-implementer.md"
onto-skeptic = "subagents/onto-skeptic.md"
